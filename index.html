<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ładowanie...</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 90vw;
            height: 90vh;
            max-width: 900px;
            max-height: 600px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="video-container" id="videoContainer">
        <iframe 
            id="rickVideo"
            src="" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        function startRickroll() {
            const container = document.getElementById('videoContainer');
            const video = document.getElementById('rickVideo');
            video.src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&rel=0&controls=1';
            
            setTimeout(() => {
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(() => {});
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (container.mozRequestFullScreen) {
                    container.mozRequestFullScreen();
                } else if (container.msRequestFullscreen) {
                    container.msRequestFullscreen();
                }
            }, 100);
        }

        // Start rickroll zaraz po załadowaniu
        window.addEventListener('load', startRickroll);

        // Próba fullscreen na każdy ESC
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                const container = document.getElementById('videoContainer');
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(() => {});
                }
            }
        });
    </script>
</body>
</html>
